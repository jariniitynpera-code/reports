name: Pikasyöttö (Voice Capture)

# Käynnistetään kahdella tavalla:
#
# 1. repository_dispatch (iOS Shortcut → GitHub API)
#    event_type: "quick-capture"
#    client_payload: { "text": "...", "capture_type": "tehtava|idea" }
#
# 2. workflow_dispatch (manuaalinen GitHub Actions UI:sta)

on:
  repository_dispatch:
    types: [quick-capture]

  workflow_dispatch:
    inputs:
      text:
        description: 'Saneltu teksti'
        required: true
        default: ''
      capture_type:
        description: 'Tyyppi: tehtava tai idea'
        required: false
        default: 'tehtava'
        type: choice
        options:
          - tehtava
          - idea
      dry_run:
        description: 'Dry-run (älä luo tehtävää)'
        required: false
        default: 'false'
        type: boolean

jobs:
  capture:
    name: Prosessoi pikasyöttö
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Aseta Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Asenna riippuvuudet
        run: pip install -r requirements.txt

      - name: Prosessoi pikasyöttö
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          CLICKUP_API_KEY:       ${{ secrets.CLICKUP_API_KEY }}
          CLICKUP_LIST_ID:       ${{ secrets.CLICKUP_LIST_ID }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:       ${{ secrets.ANTHROPIC_MODEL || 'claude-haiku-4-5-20251001' }}
          GCAL_CREDENTIALS_JSON: ${{ secrets.GCAL_CREDENTIALS_JSON }}
          GCAL_CALENDAR_ID:      ${{ secrets.GCAL_CALENDAR_ID }}
          TIMEZONE:              Europe/Helsinki
          # Shopify-muuttujat vaaditaan config.py:n validate_config:ssa
          # — pikasyöttö ei käytä niitä, mutta import config lataa silti
          SHOPIFY_SHOP:          ${{ secrets.SHOPIFY_SHOP }}
          SHOPIFY_CLIENT_ID:     ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        run: |
          # Lue teksti ja tyyppi — tukee molempia trigger-tapoja
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TEXT="${{ github.event.client_payload.text }}"
            CTYPE="${{ github.event.client_payload.capture_type }}"
            DRY_RUN="${{ github.event.client_payload.dry_run }}"
          else
            TEXT="${{ github.event.inputs.text }}"
            CTYPE="${{ github.event.inputs.capture_type }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          fi

          # Oletus-tyyppi
          CTYPE="${CTYPE:-tehtava}"

          ARGS="--text \"$TEXT\" --type $CTYPE"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Tyyppi: $CTYPE"
          echo "Teksti: $TEXT"
          eval python quick_capture.py $ARGS

      - name: Tallenna lokit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-capture-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
